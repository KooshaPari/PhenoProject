version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build every detected project using its native toolchain
    cmds:
      - task: _go_smoke
        vars:
          KIND: build
          GO_CMD: test -run '^$' ./tests
      - task: _run
        vars:
          KIND: build
          JS_SCRIPTS: build
          GO_CMD: build ./...
          RUST_CMD: build
          PY_CMD: build

  test:
    desc: Run tests for every detected project using its native toolchain
    cmds:
      - task: _go_smoke
        vars:
          KIND: test
          GO_CMD: test ./tests
      - task: _run
        vars:
          KIND: test
          JS_SCRIPTS: check test:ci test
          GO_CMD: test ./...
          RUST_CMD: test
          PY_CMD: run pytest

  lint:
    desc: Run linters for every detected project using its native toolchain
    cmds:
      - task: _run
        vars:
          KIND: lint
          JS_SCRIPTS: check:lint lint check
          GO_TOOL: golangci-lint
          GO_CMD: run
          RUST_CMD: clippy --all-targets --all-features
          PY_CMD: run ruff check .

  clean:
    desc: Remove build artifacts for every detected project
    cmds:
      - task: _run
        vars:
          KIND: clean
          JS_SCRIPTS: clean
          GO_CMD: clean -cache -testcache
          RUST_CMD: clean
          PY_CMD: rm -rf build dist .pytest_cache .ruff_cache __pycache__

  _go_smoke:
    internal: true
    silent: true
    cmds:
      - |
          set -eu

          if find tests -name '*_test.go' -type f | grep -q .; then
            echo "{{.KIND}}: ./tests (go {{.GO_CMD}})"
            GO111MODULE=off go {{.GO_CMD}}
          fi

  _run:
    internal: true
    silent: true
    cmds:
      - |
          set -eu

          has_script() {
            node -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const script = process.argv[2]; process.exit(pkg.scripts && Object.prototype.hasOwnProperty.call(pkg.scripts, script) ? 0 : 1)' "$1" "$2"
          }

          package_manager() {
            dir=$1
            while [ "$dir" != "/" ]; do
              manifest="$dir/package.json"
              if [ -f "$manifest" ]; then
                declared_pm=$(node -e 'const fs = require("fs"); const pkg = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const value = String(pkg.packageManager || "").split("@")[0]; if (value) console.log(value)' "$manifest")
                if [ -n "$declared_pm" ]; then
                  echo "$declared_pm"
                  return 0
                fi
              fi

              if [ -f "$dir/pnpm-workspace.yaml" ] || [ -f "$dir/pnpm-lock.yaml" ]; then
                echo pnpm
                return 0
              elif [ -f "$dir/bun.lock" ] || [ -f "$dir/bun.lockb" ]; then
                echo bun
                return 0
              elif [ -f "$dir/yarn.lock" ]; then
                echo yarn
                return 0
              elif [ -f "$dir/package-lock.json" ]; then
                echo npm
                return 0
              fi

              [ "$dir" = "." ] && break
              dir=$(dirname "$dir")
            done

            echo npm
          }

          run_js_task() {
            manifest=$1
            shift
            dir=$(dirname "$manifest")

            if [ "{{.KIND}}" = "clean" ]; then
              echo "clean: $dir (remove JavaScript build artifacts)"
              rm -rf "$dir/dist" "$dir/build" "$dir/coverage" "$dir/logs" "$dir/.turbo" "$dir/.next" "$dir/.react-router" "$dir/.vite" "$dir/.vitest"
              return 0
            fi

            pm=$(package_manager "$dir")

            for script in "$@"; do
              if has_script "$manifest" "$script"; then
                echo "{{.KIND}}: $dir ($pm run $script)"
                (cd "$dir" && "$pm" run "$script")
                return 0
              fi
            done

            echo "{{.KIND}}: skipping $dir (no matching package script)"
          }

          run_detected_command() {
            dir=$1
            tool=$2
            shift 2

            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "{{.KIND}}: skipping $dir ($tool not installed)"
              return 0
            fi

            echo "{{.KIND}}: $dir ($tool $*)"
            (cd "$dir" && "$tool" "$@")
          }

          find_manifests() {
            find . \
              -mindepth 1 \
              -maxdepth 6 \
              \( -path '*/.git' \
                -o -path '*/node_modules' \
                -o -path '*/dist' \
                -o -path '*/build' \
                -o -path '*/target' \
                -o -path '*/.venv' \
                -o -path '*/.turbo' \
                -o -path '*/.next' \) -prune \
              -o \( -name package.json \
                -o -name go.mod \
                -o -name Cargo.toml \
                -o -name pyproject.toml \) -type f -print \
              | sort
          }

          find_manifests | while IFS= read -r manifest; do
            [ -n "$manifest" ] || continue

            case "$manifest" in
              */package.json)
                run_js_task "$manifest" {{.JS_SCRIPTS}}
                ;;
              */go.mod)
                run_detected_command "$(dirname "$manifest")" {{default "go" .GO_TOOL}} {{.GO_CMD}}
                ;;
              */Cargo.toml)
                run_detected_command "$(dirname "$manifest")" cargo {{.RUST_CMD}}
                ;;
              */pyproject.toml)
                if [ "{{.KIND}}" = "clean" ]; then
                  dir=$(dirname "$manifest")
                  echo "clean: $dir (remove Python build caches)"
                  rm -rf "$dir/build" "$dir/dist" "$dir/.pytest_cache" "$dir/.ruff_cache" "$dir/__pycache__"
                else
                  run_detected_command "$(dirname "$manifest")" uv {{.PY_CMD}}
                fi
                ;;
            esac
          done
