name: Alert Sync Issues
permissions:
  contents: read
  issues: write
  security-events: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  alert-sync:
    uses: KooshaPari/phenoShared/.github/workflows/alert-sync-issues.yml@95d94d5d77015368ee802130bf4feaae0b3566db
    with:
      auto-label: auto-alert-sync
