name: Alert Sync Issues
permissions:
  contents: read
  issues: write
  security-events: read
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
jobs:
  alert-sync:
    uses: KooshaPari/phenoShared/.github/workflows/alert-sync-issues.yml@58a298df8b37765e3d04ff975de22d3dd88bfbd9
    with:
      auto-label: auto-alert-sync
